# fly.toml app configuration file generated for web-plumber on 2026-07-16T20:37:03Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'web-plumber'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_DEBUG = 'false'
  APP_ENV = 'production'
  APP_FALLBACK_LOCALE = 'en'
  APP_LOCALE = 'pl'
  APP_URL = 'https://web-plumber.fly.dev'
  CACHE_STORE = 'file'
  DB_CONNECTION = 'sqlite'
  LOG_LEVEL = 'warning'
  QUEUE_CONNECTION = 'sync'
  SESSION_DRIVER = 'file'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
