app = "web-plumber"
primary_region = "fra"

[build]
  Dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  APP_URL = "https://web-plumber.fly.dev"
  APP_LOCALE = "pl"
  APP_FALLBACK_LOCALE = "en"
  SESSION_DRIVER = "file"
  CACHE_STORE = "file"
  QUEUE_CONNECTION = "sync"
  LOG_LEVEL = "warning"
  DB_CONNECTION = "pgsql"
  DB_HOST = "${DB_HOST}"
  DB_PORT = "5432"
  DB_DATABASE = "web_plumber"
  DB_USERNAME = "web_plumber"
  DB_PASSWORD = "${DB_PASSWORD}"

[deploy]
  release_command = "php artisan migrate --force"
